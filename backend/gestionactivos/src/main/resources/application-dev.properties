# Configuraciï¿½n de base de datos para desarrollo
spring.datasource.url=jdbc:mysql://localhost:3306/gestionactivos_dev?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraciï¿½n de JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Configuraciï¿½n de JWT para desarrollo
jwt.secret=clave_secreta_desarrollo_segura_gestionactivos_2024_dev_environment
jwt.expiration=86400000

# Configuraciï¿½n del servidor
server.port=8080

# Configuraciï¿½n de logging
logging.level.root=INFO
logging.level.com.gestionactivos=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=INFO

# Configuraciï¿½n de CORS
cors.allowed-origins=http://localhost:3000,http://localhost:4200
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type
cors.exposed-headers=Authorization
cors.allow-credentials=true
cors.max-age=3600