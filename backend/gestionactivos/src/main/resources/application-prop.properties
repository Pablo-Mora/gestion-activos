# Configuraciï¿½n de base de datos para producciï¿½n
spring.datasource.url=jdbc:mysql://db_hostname:3306/gestionactivos_prod?useSSL=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraciï¿½n de JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Configuraciï¿½n de JWT para producciï¿½n
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Configuraciï¿½n del servidor
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=20

# Configuraciï¿½n de logging
logging.level.root=WARN
logging.level.com.gestionactivos=INFO
logging.level.org.springframework=WARN
logging.file.name=/var/logs/gestionactivos/application.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# Configuraciï¿½n de CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type
cors.exposed-headers=Authorization
cors.allow-credentials=true
cors.max-age=3600

# Configuraciï¿½n de seguridad adicional
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEYSTORE:}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tomcat

# Actuator para monitoreo
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized